services:
  plex-monitor:
    # Pull the prebuilt image published by GitHub Actions.
    image: ghcr.io/doctorkomodo/syno_plex_change_monitor:latest
    # To build locally instead, uncomment the line below and run
    # `docker compose build` / `docker compose up --build`. Leave it commented
    # for normal use — Synology Container Manager tries to build on startup
    # when this is present, which fails on the NAS.
    # build: .
    container_name: plex-monitor
    restart: unless-stopped

    environment:
      # --- Plex connection ---------------------------------------------------
      PLEX_SERVER: "https://192-168-0-8.667d51705797471ea1da1e6234ed9f7e.plex.direct:32400"

      # --- Library map: <container-path>:<plex-section-id>, comma-separated ---
      # These are the paths *inside this container* (and inside Plex). They must
      # match how Plex sees the media so partial scans target the right folder.
      PLEX_LIBRARIES: "/data/media/movies:1,/data/media/tvseries:2"

      # --- Tuning ------------------------------------------------------------
      WAIT_SEC: "30"
      IGNORE_DIRS: "@eaDir,#snapshot"
      LOGFILE: "/dev/stdout"           # let `docker logs` capture output
      TZ: "Europe/Oslo"                # for correct log timestamps

      # --- Secret (read from a Docker secret file, never inline in env) -------
      PLEX_TOKEN_FILE: "/run/secrets/plex_token"

    volumes:
      # host (NAS) source : container target
      # The container target must match the paths in PLEX_LIBRARIES (and how
      # Plex sees the media). Sources must be local /volume2 paths for inotify.
      - /volume2/movies:/data/media/movies
      - /volume2/tvseries:/data/media/tvseries

    secrets:
      - plex_token

secrets:
  plex_token:
    file: ./plex_token.txt    # gitignored; chmod 600 on the NAS
