# media-scan-monitor — see README.md for setup, ownership, and troubleshooting.

services:
  media-scan-monitor:
    image: ghcr.io/doctorkomodo/media-scan-monitor:latest
    container_name: media-scan-monitor
    restart: unless-stopped
    init: true

    # Owner of your media (and ./config). See README "Reading your media".
    user: "${MSM_UID:-1000}:${MSM_GID:-1000}"
    # Alternative when media is group-readable (Synology "users" is GID 100):
    # group_add:
    #   - "100"

    ports:
      - "12000:8080"

    environment:
      TZ: "Europe/Oslo"
      # First-run password is auto-generated by default (README "First login").
      # To preset one, set MSM_PASSWORD, or use the secrets block below.
      # MSM_PASSWORD_FILE: "/run/secrets/msm_password"

    volumes:
      # Persistent state: app.db + secret.key. Must be writable by the user above.
      - ./config:/config
      # Media sources — LOCAL storage only (inotify does not work over NFS/SMB).
      # Container path must match what your media server uses for the same library.
      - /path/to/your/media:/data/media:ro
      # - /path/to/your/tvseries:/data/tvseries:ro

    # secrets:
    #   - msm_password

  # Opt-in, privileged sidecar that raises the host-global inotify watch limit.
  # Prefer a host-level sysctl instead (README "inotify watch limit").
  # Run with: docker compose --profile init-watches up
  init-watches:
    profiles: ["init-watches"]
    image: busybox:stable
    privileged: true
    restart: "no"
    command: >
      sysctl -w fs.inotify.max_user_watches=${MSM_INOTIFY_WATCHES:-131072}

# Opt-in password preset — also uncomment the service `secrets:` block above.
# echo "your-password-here" > ./msm_password.txt && chmod 600 ./msm_password.txt
# secrets:
#   msm_password:
#     file: ./msm_password.txt
