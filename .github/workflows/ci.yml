name: CI

on:
  push:
    branches: [main, app-v2]
    paths:
      - 'mediascanmonitor/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'mediascanmonitor/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0   # exact tag — setup-uv has no bare `v8` moving tag
        with:
          version: "0.11.21"        # pinned (verified); keep in sync with the dev box
          python-version: "3.14"
          enable-cache: true

      # --locked asserts uv.lock is in sync with pyproject.toml and fails otherwise,
      # so the committed lockfile is the single source of truth for installs.
      - name: Install dependencies (locked)
        run: uv sync --locked --extra dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy (type check)
        run: uv run mypy mediascanmonitor

      - name: Pytest
        run: uv run pytest
