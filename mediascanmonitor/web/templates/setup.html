{% extends "base.html" %}
{% block title %}First-run setup — media-scan-monitor{% endblock %}
{% block body_class %}auth{% endblock %}
{% block content %}
<div class="auth-brand">MSM<span class="sep">//</span></div>
<section class="card auth-card">
  <h1>Set an admin password</h1>
  <p class="muted">No password is set yet. Choose one to secure the dashboard.</p>
  <form method="post" action="/setup">
    <label>Password <input type="password" name="password" autofocus required /></label>
    <button type="submit">Create password</button>
  </form>
</section>
{% endblock %}
