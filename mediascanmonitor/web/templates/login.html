{% extends "base.html" %}
{% block title %}Sign in — media-scan-monitor{% endblock %}
{% block body_class %}auth{% endblock %}
{% block content %}
<div class="auth-brand">MSM<span class="sep">//</span></div>
<section class="card auth-card">
  <h1>Sign in</h1>
  {% if info %}<p class="ok" role="status">{{ info }}</p>{% endif %}
  <form method="post" action="/auth/login">
    <label>Password <input type="password" name="password" autofocus required /></label>
    <button type="submit">Sign in</button>
  </form>
  <p class="auth-links"><a href="/auth/reset-password">Forgot password?</a></p>
</section>
{% endblock %}
